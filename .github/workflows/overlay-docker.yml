name: Build overlay Ghost (Resend)

on:
  push:
    branches: [beyond925-resend]
    paths: ["docker/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  overlay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.overlay
          push: true
          tags: |
            ghcr.io/beyond925-gmbh/ghost:resend
            ghcr.io/beyond925-gmbh/ghost:resend-overlay
